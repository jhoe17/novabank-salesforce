<template>
    <lightning-card title="Gestión de Tarjetas" icon-name="standard:account">

        <!-- BOTÓN CREAR -->
        <div class="slds-m-bottom_small">
            <lightning-button 
                label="Nueva Tarjeta"
                variant="brand"
                onclick={handleNew}>
            </lightning-button>
        </div>

        <!-- TABLA -->
        <lightning-datatable
            key-field="Id"
            data={data}
            columns={columns}
            onrowaction={handleRowAction}>
        </lightning-datatable>

    </lightning-card>
</template>
